server.port=8086
spring.application.name=mishes-pago

param.dbname=mishes_pago_db
param.clientes.url=http://localhost:8081/
param.pedidos.url=http://localhost:8084/

spring.datasource.url=jdbc:mysql://localhost:3306/${param.dbname}?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
